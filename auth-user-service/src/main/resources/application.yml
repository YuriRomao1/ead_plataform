spring:
  application:
    name: auth-user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_user_db
    username: auth_user
    password: auth_user_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: ead
    password: ead

server:
  port: 8081

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId}]"

auth-user-service:
  security:
    password:
      bcrypt-strength: 10
  messaging:
    rabbitmq:
      exchange: ead.domain.events
      user-created-routing-key: auth-user.user-created
  outbox:
    publisher:
      enabled: true
      fixed-delay: 5000
      batch-size: 20
      max-attempts: 5
      retry-delay: PT30S
    cleanup:
      enabled: true
      fixed-delay: 86400000
      retention: P30D
    maintenance:
      requeue-batch-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
