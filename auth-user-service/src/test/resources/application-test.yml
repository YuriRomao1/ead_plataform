spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///auth_user_test_db
    username: auth_user
    password: auth_user_password
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
